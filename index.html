<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研修復習用ポータル</title>
    <!-- Favicon (タブアイコン) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e5401d'><path d='M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z'/></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <img src="trainocate_logo.png" alt="TRAINOCATE" class="header-logo" onerror="this.style.display='none'">
            <h1 class="header-title">
                <svg class="header-title-icon" viewBox="0 0 24 24" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z" />
                </svg>
                研修復習ポータル
            </h1>
            <p>いつでも・どこでも、超簡単に振り返り</p>
        </div>
    </header>

    <main class="container">
        <!-- フィルタリング用のタブエリア -->
        <section class="filter-section">
            <div id="category-tabs" class="category-tabs"></div>
        </section>

        <section id="content-list" class="content-list"></section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 研修プログラム. All rights reserved.</p>
        <button id="admin-btn" class="admin-btn">🔧 管理者</button>
    </footer>

    <!-- ===== パスワード入力モーダル ===== -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>管理者認証</h2>
            <p>パスワードを入力してください。</p>
            <input type="password" id="admin-password" class="modal-input" placeholder="パスワード">
            <p id="password-error" class="modal-error" style="display:none;">パスワードが間違っています。</p>
            <div class="modal-actions">
                <button id="password-cancel" class="modal-btn cancel">キャンセル</button>
                <button id="password-submit" class="modal-btn submit">認証</button>
            </div>
        </div>
    </div>

    <!-- ===== 管理者パネル ===== -->
    <div id="admin-panel" class="modal-overlay">
        <div class="admin-panel-box">
            <div class="admin-panel-header">
                <h2>📋 コンテンツ管理</h2>
                <button id="admin-close" class="admin-close-btn">&times;</button>
            </div>

            <!-- 新規追加フォーム -->
            <form id="add-content-form" class="admin-form">
                <h3>新規コンテンツの追加</h3>
                <div class="form-group">
                    <label for="input-title">タイトル</label>
                    <input type="text" id="input-title" required placeholder="例：IT基礎-1章（解説動画）">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="input-category">カテゴリ</label>
                        <input type="text" id="input-category" required placeholder="例：IT基礎">
                    </div>
                    <div class="form-group">
                        <label for="input-type">種類</label>
                        <select id="input-type">
                            <option value="video">動画（YouTube）</option>
                            <option value="audio">音声（Googleドライブ）</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="input-url">URL</label>
                    <input type="url" id="input-url" required placeholder="例：https://www.youtube.com/watch?v=xxxxx">
                </div>
                <div class="form-group">
                    <label for="input-desc">説明（任意）</label>
                    <input type="text" id="input-desc" placeholder="例：復習用の動画です。">
                </div>
                <button type="submit" class="admin-submit-btn">＋ 追加する</button>
            </form>

            <!-- 登録済みコンテンツ一覧 -->
            <div class="admin-list-section">
                <h3>登録済みコンテンツ一覧</h3>
                <div id="admin-item-list"></div>
            </div>

            <!-- エクスポートボタン -->
            <div class="admin-export-section">
                <button id="export-btn" class="admin-export-btn">📥 data.js をダウンロード（GitHub反映用）</button>
                <p class="export-note">ダウンロードした data.js をプロジェクトフォルダに上書き保存し、GitHubにPushすると全受講者に反映されます。</p>
            </div>
        </div>
    </div>

    <!-- スクリプトの読み込み -->
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="admin.js"></script>
</body>

</html>
