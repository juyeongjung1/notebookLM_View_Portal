<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研修復習用ポータル</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <img src="trainocate_logo.png" alt="TRAINOCATE" class="header-logo" onerror="this.style.display='none'">
            <h1 class="header-title">
                <svg class="header-title-icon" viewBox="0 0 24 24" fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z" />
                </svg>
                研修復習ポータル
            </h1>
            <p>いつでも・どこでも、超簡単に振り返り</p>
        </div>
    </header>

    <main class="container">
        <!-- フィルタリング用のタブエリア -->
        <section class="filter-section">
            <div id="category-tabs" class="category-tabs">
                <!-- JavaScriptで動的にタブが生成されます -->
            </div>
        </section>

        <section id="content-list" class="content-list">
            <!-- JavaScriptで動的にコンテンツが生成されます -->
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 研修プログラム. All rights reserved.</p>
    </footer>

    <!-- スクリプトの読み込み（data.js は app.js より前に読み込む） -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
